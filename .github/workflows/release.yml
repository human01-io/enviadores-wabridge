# Builds wabridge.exe natively on a Windows runner (CGO needed for
# go-sqlite3 — cross-compiling from Linux would require mingw-w64 dance),
# auto-bumps a patch tag, publishes a GitHub Release with the binary as
# an asset.
#
# The Windows box's update.ps1 polls
#   https://github.com/.../releases/latest/download/wabridge.exe
# which always resolves to the asset on the latest non-prerelease tag,
# so any new push to main rolls out within the scheduled-task interval.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create tags + releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag bumping needs full history

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build wabridge.exe
        shell: pwsh
        run: |
          go build -trimpath -ldflags="-s -w" -o wabridge.exe ./cmd/wabridge
          if (-not (Test-Path wabridge.exe)) { throw "Build did not produce wabridge.exe" }
          Get-Item wabridge.exe | Select-Object Name, Length, LastWriteTime

      - name: Bump tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Default bump is patch; override via PR labels (minor / major)
          # if/when we wire those up. For now every main push = patch bump.
          default_bump: patch
          tag_prefix: v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: |
            Automated release for ${{ steps.tag.outputs.new_tag }}.

            Commit: ${{ github.sha }}
            Changes: ${{ steps.tag.outputs.changelog }}
          files: wabridge.exe
          fail_on_unmatched_files: true
